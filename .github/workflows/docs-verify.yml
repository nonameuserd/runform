# Verify MkDocs builds on pull requests (read-only; satisfies ci_policy_test untrusted-PR rules).
# Deploy lives in docs.yml — this workflow must not grant `pages: write` or other PR write permissions.
name: Docs (verify)

on:
  pull_request:
    branches:
      - main
      - master
      - dev
      - "release/*"
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
      - ".github/workflows/docs-verify.yml"

permissions:
  contents: read

jobs:
  mkdocs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.11"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (docs extra)
        run: uv sync --frozen --extra docs

      - name: Build MkDocs site (strict)
        run: uv run mkdocs build --strict
