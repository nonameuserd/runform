# CI: lint, format, typecheck, test on every push and PR
name: CI

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - master
      - dev
      - "release/*"
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - main
      - master
      - dev
      - "release/*"

jobs:
  policy-test:
    name: Policy test (OSPS untrusted PR guardrails)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Run CI policy checks
        run: uv run python scripts/ci_policy_test.py

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src/akc

      - name: pytest
        run: uv run pytest

      - name: Security gate (dependency vulns + SBOM)
        run: |
          set -euo pipefail
          mkdir -p ./.tmp
          uv export \
            --format requirements.txt \
            --extra dev \
            --frozen \
            --no-emit-project \
            --no-hashes \
            -o ./.tmp/requirements.txt
          # Generates a CycloneDX SBOM annotated with known Python dependency vulnerabilities.
          # The step fails when vulnerabilities are found (vulnerability scanning gate).
          uv run pip-audit \
            -r ./.tmp/requirements.txt \
            -f cyclonedx-json \
            -o ./.tmp/python-deps-vuln.sbom.cdx.json \
            --progress-spinner off

      - name: Eval regression gates
        run: |
          set -euo pipefail
          uv run akc eval \
            --suite-path configs/evals/intent_system_v1.json \
            --outputs-root ./.tmp/akc-evals \
            --baseline-report-path configs/evals/intent_system_v1_baseline.json \
            --report-out ./.tmp/akc-evals/latest-report.json

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust (stable + tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        working-directory: rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        working-directory: rust
        run: cargo test --all

      - name: Install cargo-vet
        run: cargo install cargo-vet --locked

      - name: Cargo Vet (supply chain)
        working-directory: rust
        run: cargo vet --locked

      - name: Cargo Vet exemptions guard
        working-directory: rust
        env:
          MAX_EXEMPTIONS: "210"
        run: |
          set -euo pipefail
          count="$(python3 -c 'from pathlib import Path; lines = Path("supply-chain/config.toml").read_text().splitlines(); print(sum(1 for l in lines if l.startswith("[[exemptions.")))')"
          echo "cargo-vet exemptions entries: ${count} (max=${MAX_EXEMPTIONS})"
          if [ "$count" -gt "${MAX_EXEMPTIONS}" ]; then
            echo "Exemptions regression: update rust/supply-chain/* by importing audits or certifying crates."
            exit 1
          fi

  rust_bwrap:
    name: Linux bwrap hardened isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install bubblewrap
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          bwrap --version

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Run hardened isolation tests (bwrap backend)
        working-directory: rust
        env:
          AKC_EXEC_BACKEND: bwrap
        run: |
          set -euo pipefail
          cargo test -p akc_executor --test tenant_isolation

  docker_hardening:
    name: Docker hardening regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify Docker capability
        run: |
          set -euo pipefail
          docker version
          docker info

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run Docker hardening unit and runtime tests
        run: |
          set -euo pipefail
          uv run pytest \
            tests/unit/test_compile_executors.py \
            tests/unit/test_cli_compile.py \
            tests/integration/test_docker_runtime_hardening.py

      - name: Build Docker compile test image
        run: |
          set -euo pipefail
          dockerfile="${RUNNER_TEMP}/Dockerfile.akc-ci-pytest"
          cat > "${dockerfile}" <<'DOCKERFILE'
          FROM python:3.12-slim
          RUN python -m pip install --no-cache-dir pytest
          DOCKERFILE
          docker build -t akc-ci-pytest:latest -f "${dockerfile}" "${RUNNER_TEMP}"

      - name: Seed approved repo for enforced Docker compile
        run: |
          set -euo pipefail
          root="${RUNNER_TEMP}/docker-compile-out"
          repo_root="${root}/tenant-ci/repo-prod/tenant-ci/repo-prod"
          mkdir -p "${repo_root}/src" "${repo_root}/tests"
          : > "${repo_root}/src/__init__.py"
          printf 'VALUE = 1\n' > "${repo_root}/src/module.py"
          printf 'from src import module\n\ndef test_smoke() -> None:\n    assert module.VALUE == 1\n' > "${repo_root}/tests/test_module.py"
          export AKC_DOCKER_COMPILE_ROOT="${root}"
          uv run python - <<'PY'
          import os
          from pathlib import Path

          from akc.memory.facade import build_memory

          outputs_root = Path(os.environ["AKC_DOCKER_COMPILE_ROOT"])
          base = outputs_root / "tenant-ci" / "repo-prod"
          memory_db = base / ".akc" / "memory.sqlite"
          memory_db.parent.mkdir(parents=True, exist_ok=True)
          mem = build_memory(backend="sqlite", sqlite_path=str(memory_db))
          plan = mem.plan_state.create_plan(
              tenant_id="tenant-ci",
              repo_id="repo-prod",
              goal="Compile repository",
              initial_steps=["Run tests"],
          )
          mem.plan_state.set_active_plan(
              tenant_id="tenant-ci",
              repo_id="repo-prod",
              plan_id=plan.id,
          )
          PY

      - name: Install OPA
        run: |
          set -euo pipefail
          curl -fsSL -o "${RUNNER_TEMP}/opa" \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          sudo install -m 0755 "${RUNNER_TEMP}/opa" /usr/local/bin/opa
          opa version

      - name: Enforce Docker strong compile policy
        run: |
          set -euo pipefail
          uv run akc compile \
            --tenant-id tenant-ci \
            --repo-id repo-prod \
            --outputs-root "${RUNNER_TEMP}/docker-compile-out" \
            --sandbox strong \
            --strong-lane-preference docker \
            --policy-mode enforce \
            --opa-policy-path ./configs/policy/compile_tools_prod.rego \
            --docker-image akc-ci-pytest:latest \
            --docker-ulimit-nofile 1024:2048 \
            --docker-ulimit-nproc 256 \
            --docker-seccomp-profile runtime/default \
            --docker-apparmor-profile docker-default

  rust_windows:
    name: Windows sandbox
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust (stable + tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        working-directory: rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        working-directory: rust
        run: cargo test --all

      - name: Windows sandbox tests
        working-directory: rust
        run: cargo test -p akc_executor --test tenant_isolation

  wasm_lane:
    name: WASM lane regression (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test (WASM lane)
        working-directory: rust
        run: cargo test -p akc_executor --test wasm_lane

      - name: Pytest (WASM CLI contracts)
        run: uv run pytest tests/unit/test_cli_compile.py -k wasm

  dafny:
    if: >
      (github.event_name == 'push' &&
       (startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'pull_request' &&
       (github.base_ref == 'main' ||
        startsWith(github.base_ref, 'release/') ||
        contains(github.event.pull_request.labels.*.name, 'correctness')))
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for Dafny module
        id: dafny_paths
        run: |
          if [ -f formal/dafny/budget_policy.dfy ]; then
            echo "has_dafny=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dafny=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dafny
        if: steps.dafny_paths.outputs.has_dafny == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Download the correct Ubuntu zip from the *current* latest release.
          # The previous URL mixed "latest" with a pinned asset name, which breaks
          # as soon as "latest" moves forward.
          gh release download \
            --repo dafny-lang/dafny \
            --pattern '*x64-ubuntu-*.zip' \
            --output dafny.zip

          unzip -q dafny.zip -d "$HOME/dafny"

          # Add the extracted top-level directory to PATH.
          top_dir="$(unzip -Z1 dafny.zip | head -n 1 | cut -d/ -f1)"
          if [ -z "${top_dir}" ] || [ ! -d "$HOME/dafny/$top_dir" ]; then
            echo "Failed to detect Dafny install directory after unzip." >&2
            exit 1
          fi
          echo "$HOME/dafny/$top_dir" >> "$GITHUB_PATH"

      - name: Run Dafny verification
        if: steps.dafny_paths.outputs.has_dafny == 'true'
        run: dafny verify formal/dafny/budget_policy.dfy

  verus:
    if: >
      (github.event_name == 'push' &&
       (startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'pull_request' &&
       (github.base_ref == 'main' ||
        startsWith(github.base_ref, 'release/') ||
        contains(github.event.pull_request.labels.*.name, 'correctness')))
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for Verus crate
        id: verus_paths
        run: |
          if [ -f formal/verus/Cargo.toml ]; then
            echo "has_verus=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_verus=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain with Verus
        if: steps.verus_paths.outputs.has_verus == 'true'
        run: |
          rustup update stable
          # Assuming cargo-verus is available via cargo install; adjust when pinned.
          cargo install cargo-verus || true

      - name: Run Verus verification
        if: steps.verus_paths.outputs.has_verus == 'true'
        working-directory: formal/verus
        run: cargo verus
