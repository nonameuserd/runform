# CI: lint, format, typecheck, test on every push and PR
name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      - dev
      - "release/*"
  pull_request:
    branches:
      - main
      - master
      - dev
      - "release/*"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src/akc

      - name: pytest
        run: uv run pytest

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable + tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        working-directory: rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        working-directory: rust
        run: cargo test --all

      - name: Install cargo-vet
        run: cargo install cargo-vet --locked

      - name: Cargo Vet (supply chain)
        working-directory: rust
        run: cargo vet --locked

      - name: Cargo Vet exemptions guard
        working-directory: rust
        env:
          MAX_EXEMPTIONS: "210"
        run: |
          set -euo pipefail
          count="$(python3 -c 'from pathlib import Path; lines = Path("supply-chain/config.toml").read_text().splitlines(); print(sum(1 for l in lines if l.startswith("[[exemptions.")))')"
          echo "cargo-vet exemptions entries: ${count} (max=${MAX_EXEMPTIONS})"
          if [ "$count" -gt "${MAX_EXEMPTIONS}" ]; then
            echo "Exemptions regression: update rust/supply-chain/* by importing audits or certifying crates."
            exit 1
          fi

  dafny:
    if: >
      (github.event_name == 'push' &&
       (startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'pull_request' &&
       (github.base_ref == 'main' ||
        startsWith(github.base_ref, 'release/') ||
        contains(github.event.pull_request.labels.*.name, 'correctness')))
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Check for Dafny module
        id: dafny_paths
        run: |
          if [ -f formal/dafny/budget_policy.dfy ]; then
            echo "has_dafny=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dafny=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dafny
        if: steps.dafny_paths.outputs.has_dafny == 'true'
        run: |
          curl -L https://github.com/dafny-lang/dafny/releases/latest/download/dafny-4.9.1-x64-ubuntu.zip -o dafny.zip
          unzip -q dafny.zip -d "$HOME/dafny"
          echo "$HOME/dafny" >> "$GITHUB_PATH"

      - name: Run Dafny verification
        if: steps.dafny_paths.outputs.has_dafny == 'true'
        run: dafny verify formal/dafny/budget_policy.dfy

  verus:
    if: >
      (github.event_name == 'push' &&
       (startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'pull_request' &&
       (github.base_ref == 'main' ||
        startsWith(github.base_ref, 'release/') ||
        contains(github.event.pull_request.labels.*.name, 'correctness')))
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Check for Verus crate
        id: verus_paths
        run: |
          if [ -f formal/verus/Cargo.toml ]; then
            echo "has_verus=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_verus=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain with Verus
        if: steps.verus_paths.outputs.has_verus == 'true'
        run: |
          rustup update stable
          # Assuming cargo-verus is available via cargo install; adjust when pinned.
          cargo install cargo-verus || true

      - name: Run Verus verification
        if: steps.verus_paths.outputs.has_verus == 'true'
        working-directory: formal/verus
        run: cargo verus
