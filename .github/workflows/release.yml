name: Release

on:
  push:
    branches:
      - main
      - "release/*"

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (dev, includes semantic-release)
        run: uv sync --extra dev

      - name: Run python-semantic-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release publish

  rust-integrity:
    runs-on: ubuntu-latest
    needs: release
    outputs:
      base64_subjects: ${{ steps.subjects.outputs.base64_subjects }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust binaries (release)
        working-directory: rust
        run: |
          cargo build --release -p akc_executor --bin akc-exec
          cargo build --release -p akc_ingest --bin akc-ingest

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
          enable-cache: true

      - name: Build Python artifacts (uv build)
        run: |
          uv python install 3.11
          uv build

      - name: SBOM (Python dist)
        uses: anchore/sbom-action@v0
        with:
          path: dist
          format: spdx-json
          output-file: python-dist.sbom.spdx.json
          artifact-name: python-dist.sbom
          upload-release-assets: false

      - name: Prepare SLSA subjects (base64)
        id: subjects
        run: |
          set -euo pipefail
          file1="rust/target/release/akc-exec"
          file2="rust/target/release/akc-ingest"
          test -f "$file1" || (echo "missing $file1" && exit 1)
          test -f "$file2" || (echo "missing $file2" && exit 1)

          h1="$(sha256sum "$file1" | awk '{print $1}')"
          h2="$(sha256sum "$file2" | awk '{print $1}')"
          subjects="$(printf "%s %s\n%s %s\n" "$h1" "$file1" "$h2" "$file2")"

          dist_files="$(ls dist/*.whl dist/*.tar.gz 2>/dev/null || true)"
          if [ -z "${dist_files}" ]; then
            echo "No python dist artifacts found in dist/"; exit 1
          fi

          for f in ${dist_files}; do
            sha="$(sha256sum "$f" | awk '{print $1}')"
            subjects+="$sha $f"$'\n'
          done

          base64_subjects="$(python3 -c 'import base64,sys; s=sys.stdin.read(); print(base64.b64encode(s.encode("utf-8")).decode("utf-8"))' <<< "$subjects")"

          echo "base64_subjects=$base64_subjects" >> "$GITHUB_OUTPUT"

      - name: SBOM (akc-exec)
        uses: anchore/sbom-action@v0
        with:
          file: rust/target/release/akc-exec
          format: spdx-json
          output-file: akc-exec.sbom.spdx.json
          artifact-name: akc-exec.sbom
          upload-release-assets: false

      - name: SBOM (akc-ingest)
        uses: anchore/sbom-action@v0
        with:
          file: rust/target/release/akc-ingest
          format: spdx-json
          output-file: akc-ingest.sbom.spdx.json
          artifact-name: akc-ingest.sbom
          upload-release-assets: false

  slsa-provenance:
    needs: rust-integrity
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@main
    with:
      base64-subjects: ${{ needs.rust-integrity.outputs.base64_subjects }}
      provenance-name: akc-rust.intoto.jsonl
      upload-assets: false
      continue-on-error: true

