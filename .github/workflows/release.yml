name: Release

on:
  push:
    branches:
      - main
      - "release/*"

# Least privilege: avoid workflow-wide contents:write (Scorecard TokenPermissions).
# Grant contents:write only on jobs that push tags/releases or upload release assets.
permissions:
  contents: read
  id-token: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.next_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.11"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (dev, includes semantic-release)
        run: uv sync --frozen --extra dev

      - name: Security gate (dependency vulns + SBOM)
        run: |
          set -euo pipefail
          mkdir -p ./.tmp
          uv export \
            --format requirements.txt \
            --extra dev \
            --frozen \
            --no-emit-project \
            --no-hashes \
            -o ./.tmp/requirements.txt
          # Vulnerability scanning gate before any release publishing.
          #
          # Documented exception — Pygments GHSA-5239-wwwm-4pmq / CVE-2026-4539: see ci.yml
          # Security gate comment. Remove --ignore-vuln after locking a fixed pygments release.
          uv run pip-audit \
            -r ./.tmp/requirements.txt \
            -f cyclonedx-json \
            -o ./.tmp/python-deps-vuln.sbom.cdx.json \
            --progress-spinner off \
            --ignore-vuln GHSA-5239-wwwm-4pmq

      - name: Verify Docker capability
        run: |
          set -euo pipefail
          docker version
          docker info

      - name: Build Docker compile test image
        run: |
          set -euo pipefail
          docker build -t akc-release-pytest:latest -f deploy/Dockerfile.ci-pytest "${GITHUB_WORKSPACE}"

      - name: Seed approved repo for enforced Docker compile
        run: |
          set -euo pipefail
          root="${RUNNER_TEMP}/docker-release-compile-out"
          repo_root="${root}/tenant-release/repo-prod/tenant-release/repo-prod"
          mkdir -p "${repo_root}/src" "${repo_root}/tests"
          : > "${repo_root}/src/__init__.py"
          printf 'VALUE = 1\n' > "${repo_root}/src/module.py"
          printf 'from src import module\n\ndef test_smoke() -> None:\n    assert module.VALUE == 1\n' > "${repo_root}/tests/test_module.py"
          export AKC_DOCKER_COMPILE_ROOT="${root}"
          uv run python - <<'PY'
          import os
          from pathlib import Path

          from akc.memory.facade import build_memory

          outputs_root = Path(os.environ["AKC_DOCKER_COMPILE_ROOT"])
          base = outputs_root / "tenant-release" / "repo-prod"
          memory_db = base / ".akc" / "memory.sqlite"
          memory_db.parent.mkdir(parents=True, exist_ok=True)
          mem = build_memory(backend="sqlite", sqlite_path=str(memory_db))
          plan = mem.plan_state.create_plan(
              tenant_id="tenant-release",
              repo_id="repo-prod",
              goal="Compile repository",
              initial_steps=["Run tests"],
          )
          mem.plan_state.set_active_plan(
              tenant_id="tenant-release",
              repo_id="repo-prod",
              plan_id=plan.id,
          )
          PY

      - name: Install OPA
        run: |
          set -euo pipefail
          # The openpolicyagent.org endpoint occasionally flakes in CI (curl: (56)).
          # Use retries and a GitHub Releases fallback to reduce release pipeline noise.
          for url in \
            "https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static" \
            "https://github.com/open-policy-agent/opa/releases/latest/download/opa_linux_amd64_static"
          do
            echo "Downloading OPA from: $url"
            if curl -fL --retry 6 --retry-delay 2 --retry-all-errors --max-time 120 \
              -o "${RUNNER_TEMP}/opa" \
              "$url"
            then
              break
            fi
          done
          test -s "${RUNNER_TEMP}/opa" || (echo "Failed to download OPA" && exit 1)
          sudo install -m 0755 "${RUNNER_TEMP}/opa" /usr/local/bin/opa
          opa version

      - name: Enforce Docker strong compile policy
        run: |
          set -euo pipefail
          uv run akc compile \
            --tenant-id tenant-release \
            --repo-id repo-prod \
            --outputs-root "${RUNNER_TEMP}/docker-release-compile-out" \
            --sandbox strong \
            --strong-lane-preference docker \
            --policy-mode enforce \
            --opa-policy-path ./configs/policy/compile_tools_prod.rego \
            --docker-image akc-release-pytest:latest \
            --docker-ulimit-nofile 1024:2048 \
            --docker-ulimit-nproc 256 \
            --docker-seccomp-profile runtime/default \
            --docker-apparmor-profile docker-default

      - name: Compute next release tag
        id: next_tag
        run: |
          set -euo pipefail
          echo "tag=$(uv run semantic-release version --print-tag)" >> "$GITHUB_OUTPUT"

      - name: Run python-semantic-release (version + tag + GitHub Release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release version

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release publish --tag "${{ steps.next_tag.outputs.tag }}"

  package-nuitka:
    permissions:
      contents: write
      id-token: write
    needs: release
    env:
      # Some runners/linters do not allow `secrets.*` in `if:` expressions.
      # Map secrets into env and gate on `env.*` instead.
      COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: macos-14
            platform: macos_arm64
            archive_ext: tar.gz
            exe_name: akc
          - runs_on: macos-13
            platform: macos_x64
            archive_ext: tar.gz
            exe_name: akc
          - runs_on: windows-latest
            platform: windows_x64
            archive_ext: zip
            exe_name: akc.exe
          - runs_on: ubuntu-latest
            platform: linux_x64
            archive_ext: tar.gz
            exe_name: akc
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.tag }}

      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          # `patchelf` is commonly required for reliable standalone builds.
          sudo apt-get install -y patchelf

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.11"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Install Nuitka build toolchain
        run: uv pip install nuitka

      - name: Build standalone `akc` (Nuitka)
        shell: bash
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          from __future__ import annotations

          import subprocess
          from pathlib import Path

          from tools.nuitka.build import nuitka_akc_args

          repo_root = Path(".").resolve()
          cmd = nuitka_akc_args(repo_root=repo_root, output_name="akc")
          print("Running Nuitka:", " ".join(cmd))
          subprocess.check_call(cmd)
          PY

      - name: Smoke check built binary (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          test -x "akc.dist/akc" || (echo "Expected executable akc.dist/akc not found or not executable" && exit 1)
          ./akc.dist/akc --help >/dev/null
          ./akc.dist/akc view --help >/dev/null
          ./akc.dist/akc view tui --help >/dev/null

      - name: Smoke check built binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "akc.dist\akc.exe")) { throw "Expected executable akc.dist\akc.exe not found" }
          & "akc.dist\akc.exe" --help | Out-Null
          & "akc.dist\akc.exe" view --help | Out-Null
          & "akc.dist\akc.exe" view tui --help | Out-Null

      - name: macOS codesign + notarize (Developer ID)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_SIGNING_CERT_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERT_P12_BASE64 }}
          APPLE_SIGNING_CERT_P12_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_P12_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARYTOOL_KEY_ID: ${{ secrets.APPLE_NOTARYTOOL_KEY_ID }}
          APPLE_NOTARYTOOL_ISSUER_ID: ${{ secrets.APPLE_NOTARYTOOL_ISSUER_ID }}
          APPLE_NOTARYTOOL_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARYTOOL_PRIVATE_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_SIGNING_CERT_P12_BASE64:-}" ] || \
             [ -z "${APPLE_SIGNING_CERT_P12_PASSWORD:-}" ] || \
             [ -z "${APPLE_SIGNING_IDENTITY:-}" ] || \
             [ -z "${APPLE_NOTARYTOOL_KEY_ID:-}" ] || \
             [ -z "${APPLE_NOTARYTOOL_ISSUER_ID:-}" ] || \
             [ -z "${APPLE_NOTARYTOOL_PRIVATE_KEY_P8_BASE64:-}" ]
          then
            echo "macOS signing/notarization secrets not configured; skipping."
            exit 0
          fi

          test -d "akc.dist" || (echo "Expected Nuitka output dir akc.dist not found" && exit 1)
          test -f "akc.dist/akc" || (echo "Expected akc.dist/akc not found" && exit 1)

          keychain_path="${RUNNER_TEMP}/akc-signing.keychain-db"
          keychain_pw="$(python3 -c 'import secrets; print(secrets.token_urlsafe(24))')"

          cert_path="${RUNNER_TEMP}/developer_id.p12"
          echo "${APPLE_SIGNING_CERT_P12_BASE64}" | base64 --decode > "${cert_path}"

          security create-keychain -p "${keychain_pw}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_pw}" "${keychain_path}"
          security import "${cert_path}" -P "${APPLE_SIGNING_CERT_P12_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_pw}" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"

          # Sign the executable and any native shared libs Nuitka bundled.
          sign_id="${APPLE_SIGNING_IDENTITY}"
          sign_args=(codesign --force --options runtime --timestamp --sign "${sign_id}")

          "${sign_args[@]}" "akc.dist/akc"

          # Best-effort: sign native libs if present (avoid failing on empty matches).
          while IFS= read -r -d '' f; do
            "${sign_args[@]}" "${f}"
          done < <(find "akc.dist" -type f \( -name "*.dylib" -o -name "*.so" \) -print0 || true)

          codesign --verify --deep --strict --verbose=2 "akc.dist/akc"
          spctl -a -t exec -vv "akc.dist/akc" || true

          # Notarize a zip of the standalone bundle directory (Developer ID notarization).
          notary_zip="${RUNNER_TEMP}/akc-notary.zip"
          /usr/bin/ditto -c -k --keepParent "akc.dist" "${notary_zip}"

          p8_path="${RUNNER_TEMP}/AuthKey.p8"
          echo "${APPLE_NOTARYTOOL_PRIVATE_KEY_P8_BASE64}" | base64 --decode > "${p8_path}"

          xcrun notarytool submit \
            "${notary_zip}" \
            --key "${p8_path}" \
            --key-id "${APPLE_NOTARYTOOL_KEY_ID}" \
            --issuer "${APPLE_NOTARYTOOL_ISSUER_ID}" \
            --wait

      - name: Windows signtool (Authenticode)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_PFX_BASE64 }}
          WINDOWS_SIGNING_CERT_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PFX_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_PFX_PASSWORD)) {
            Write-Host "Windows signing secrets not configured; skipping."
            exit 0
          }

          if (-not (Test-Path "akc.dist")) { throw "Expected Nuitka output dir akc.dist not found" }
          if (-not (Test-Path "akc.dist\akc.exe")) { throw "Expected akc.dist\akc.exe not found" }

          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_PFX_BASE64))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found (Windows SDK missing?)" }

          & $signtool.FullName sign `
            /f $pfxPath `
            /p $env:WINDOWS_SIGNING_CERT_PFX_PASSWORD `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            "akc.dist\akc.exe"

          & $signtool.FullName verify /pa /v "akc.dist\akc.exe"

      - name: Package archive + checksums
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.release.outputs.tag }}"
          platform="${{ matrix.platform }}"
          archive_ext="${{ matrix.archive_ext }}"

          uv run python - <<'PY'
          from __future__ import annotations

          import hashlib
          import os
          import shutil
          import tarfile
          import zipfile
          from pathlib import Path

          tag = os.environ["TAG"]
          platform = os.environ["PLATFORM"]
          archive_ext = os.environ["ARCHIVE_EXT"]

          dist_dir = Path("akc.dist")
          if not dist_dir.is_dir():
              raise SystemExit("Expected Nuitka standalone output dir 'akc.dist' not found")

          out_dir = Path(".tmp_release_assets")
          if out_dir.exists():
              shutil.rmtree(out_dir)
          out_dir.mkdir(parents=True)

          bundle_root = out_dir / f"akc_{tag}_{platform}"
          shutil.copytree(dist_dir, bundle_root)

          archive_name = f"{bundle_root.name}.{archive_ext}"
          archive_path = Path.cwd() / archive_name

          if archive_ext == "zip":
              with zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
                  for p in bundle_root.rglob("*"):
                      if p.is_dir():
                          continue
                      zf.write(p, arcname=str(p.relative_to(out_dir)))
          elif archive_ext == "tar.gz":
              with tarfile.open(archive_path, "w:gz") as tf:
                  tf.add(bundle_root, arcname=bundle_root.name)
          else:
              raise SystemExit(f"Unsupported archive_ext: {archive_ext}")

          sha256 = hashlib.sha256(archive_path.read_bytes()).hexdigest()
          sha_path = archive_path.with_suffix(archive_path.suffix + ".sha256")
          sha_path.write_text(f"{sha256}  {archive_path.name}\n", encoding="utf-8")

          print(f"Wrote {archive_path}")
          print(f"Wrote {sha_path}")
          PY
        env:
          TAG: ${{ needs.release.outputs.tag }}
          PLATFORM: ${{ matrix.platform }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}

      - name: Install cosign (optional)
        if: vars.COSIGN_KEYLESS == 'true' || env.COSIGN_PRIVATE_KEY != ''
        uses: sigstore/cosign-installer@d7f1a0c78d3cf34f2c9a0cb6fa4b3c41098c5c7f # v3.9.1

      - name: Cosign bundle (optional, keyless)
        if: vars.COSIGN_KEYLESS == 'true'
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          tag="${{ needs.release.outputs.tag }}"
          platform="${{ matrix.platform }}"
          shopt -s nullglob
          archives=( "akc_${tag}_${platform}."* )
          if [ "${#archives[@]}" -eq 0 ]; then
            echo "No archives found to sign"; exit 1
          fi
          for f in "${archives[@]}"; do
            case "$f" in
              *.sha256) continue ;;
            esac
            bundle="${f}.sigstore.bundle.json"
            cosign sign-blob --bundle "${bundle}" "${f}"
          done

      - name: Cosign bundle (optional, key)
        if: vars.COSIGN_KEYLESS != 'true' && env.COSIGN_PRIVATE_KEY != ''
        shell: bash
        env:
          COSIGN_YES: "true"
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          tag="${{ needs.release.outputs.tag }}"
          platform="${{ matrix.platform }}"
          shopt -s nullglob
          archives=( "akc_${tag}_${platform}."* )
          if [ "${#archives[@]}" -eq 0 ]; then
            echo "No archives found to sign"; exit 1
          fi
          for f in "${archives[@]}"; do
            case "$f" in
              *.sha256) continue ;;
            esac
            bundle="${f}.sigstore.bundle.json"
            cosign sign-blob --key env://COSIGN_PRIVATE_KEY --bundle "${bundle}" "${f}"
          done

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.release.outputs.tag }}"
          platform="${{ matrix.platform }}"

          shopt -s nullglob
          files=( "akc_${tag}_${platform}."* )
          test "${#files[@]}" -gt 0 || (echo "No assets found to upload" && exit 1)

          gh release upload "${tag}" "${files[@]}" --clobber

  release-checksums:
    permissions:
      contents: write
    needs: [release, package-nuitka]
    runs-on: ubuntu-latest
    steps:
      - name: Download Nuitka release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.release.outputs.tag }}"
          mkdir -p .tmp_release_download
          gh release download "${tag}" --dir .tmp_release_download --pattern "akc_${tag}_*"

      - name: Generate combined SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd .tmp_release_download
          # Only hash archives; ignore existing per-asset sha files and any sigstore bundles.
          ls -1 | grep -E '\.(tar\.gz|zip)$' >/dev/null
          sha256sum *.tar.gz *.zip > "SHA256SUMS.txt"
          cat "SHA256SUMS.txt"

      - name: Upload SHA256SUMS to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.release.outputs.tag }}"
          gh release upload "${tag}" ".tmp_release_download/SHA256SUMS.txt" --clobber

  rust-integrity:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: release
    outputs:
      base64_subjects: ${{ steps.subjects.outputs.base64_subjects }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Build Rust binaries (release)
        working-directory: rust
        run: |
          cargo build --release -p akc_executor --bin akc-exec
          cargo build --release -p akc_ingest --bin akc-ingest

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.11"
          enable-cache: true

      - name: Build Python artifacts (uv build)
        run: |
          uv python install 3.11
          uv build

      - name: SBOM (Python dist)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist
          format: spdx-json
          output-file: python-dist.sbom.spdx.json
          artifact-name: python-dist.sbom
          upload-release-assets: true

      - name: Prepare SLSA subjects (base64)
        id: subjects
        run: |
          set -euo pipefail
          file1="rust/target/release/akc-exec"
          file2="rust/target/release/akc-ingest"
          test -f "$file1" || (echo "missing $file1" && exit 1)
          test -f "$file2" || (echo "missing $file2" && exit 1)

          h1="$(sha256sum "$file1" | awk '{print $1}')"
          h2="$(sha256sum "$file2" | awk '{print $1}')"
          subjects="$(printf "%s %s\n%s %s\n" "$h1" "$file1" "$h2" "$file2")"

          dist_files="$(ls dist/*.whl dist/*.tar.gz 2>/dev/null || true)"
          if [ -z "${dist_files}" ]; then
            echo "No python dist artifacts found in dist/"; exit 1
          fi

          for f in ${dist_files}; do
            sha="$(sha256sum "$f" | awk '{print $1}')"
            subjects+="$sha $f"$'\n'
          done

          base64_subjects="$(python3 -c 'import base64,sys; s=sys.stdin.read(); print(base64.b64encode(s.encode("utf-8")).decode("utf-8"))' <<< "$subjects")"

          echo "base64_subjects=$base64_subjects" >> "$GITHUB_OUTPUT"

      - name: SBOM (akc-exec)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: rust/target/release/akc-exec
          format: spdx-json
          output-file: akc-exec.sbom.spdx.json
          artifact-name: akc-exec.sbom
          upload-release-assets: true

      - name: SBOM (akc-ingest)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: rust/target/release/akc-ingest
          format: spdx-json
          output-file: akc-ingest.sbom.spdx.json
          artifact-name: akc-ingest.sbom
          upload-release-assets: true

  slsa-provenance:
    permissions:
      contents: write
      id-token: write
      actions: read
    needs: [release, rust-integrity]
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.rust-integrity.outputs.base64_subjects }}
      provenance-name: akc-rust.intoto.jsonl
      compile-generator: true
      upload-assets: true
      upload-tag-name: ${{ needs.release.outputs.tag }}
