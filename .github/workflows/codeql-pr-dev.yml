name: CodeQL (PR to dev)

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (CodeQL, no upload)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@603b797f8b14b413fe025cd935a91c16c4782713 # v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@603b797f8b14b413fe025cd935a91c16c4782713 # v3
        with:
          upload: false

