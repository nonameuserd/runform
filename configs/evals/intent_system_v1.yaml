suite_version: intent-system-v1
regression_thresholds:
  min_success_rate: 1.0
  max_avg_repair_iterations: 2.0
  max_success_rate_drop: 0.05
  max_avg_wall_time_regression_pct: 50.0
  min_runtime_replay_determinism_rate: 1.0
  max_avg_runtime_rollbacks_total: 0.0
living_recompile_policy:
  granular_acceptance_triggers: true
  operational_validity_failed_trigger_severity: block
runtime_canary_thresholds:
  max_total_impacts: 10
tasks:
  - id: golden-sample-manifest
    tenant_id: eval-tenant
    repo_id: eval-repo
    manifest_path: fixtures/sample_run.manifest.json
    checks:
      require_success: true
      required_passes: [plan, retrieve, generate, execute]
      max_repair_iterations: 2
      max_total_tokens: 2000
      max_wall_time_ms: 30000
      require_unit_tests_passed: true
      require_trace_spans: true
    judge:
      enabled: true
      expected_keywords:
        - src/sample.py
        - tests/test_sample.py
      min_score: 1.0

  - id: compile-repair-sample
    tenant_id: eval-tenant
    repo_id: eval-repo
    intent: Implement sample eval task
    checks:
      require_success: true
      required_passes: [plan, retrieve, generate, execute]
      max_repair_iterations: 2
      max_total_tokens: 100000
      max_wall_time_ms: 30000
      require_unit_tests_passed: true
      require_trace_spans: true
      require_runtime_replay_determinism: true
      runtime_mode: simulate
      runtime_reliability_kpis:
        max_rollbacks_total: 0
        max_convergence_latency_ms_avg: 60000
        max_mttr_like_repair_latency_ms_avg: 60000
        require_terminal_health_in: [healthy, unknown, degraded]
    judge:
      enabled: true
      expected_keywords:
        - src/akc_eval_compiled.py
        - tests/test_akc_eval_compiled.py
      min_score: 1.0

