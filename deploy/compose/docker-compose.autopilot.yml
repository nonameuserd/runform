# Reference Compose stack: one autopilot container with restart policy and healthcheck.
# Build from repo root: docker compose -f deploy/compose/docker-compose.autopilot.yml up --build
#
# Health: process liveness via pgrep (adjust if your image lacks procps).
# Metrics/logs: scrape container stdout or ship journald/docker logging driver.

services:
  akc-runtime-autopilot:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.autopilot
    image: akc-runtime-autopilot:local
    restart: unless-stopped
    working_dir: /data
    # Single-writer: keep replicas=1 unless outputs are on shared storage with valid flock
    # OR use Kubernetes Lease (--lease-backend k8s) in cluster deployments.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      AKC_LIVING_AUTOMATION_PROFILE: living_loop_unattended_v1
      AKC_AUTOPILOT_EXPECT_REPLICAS: "1"
      AKC_AUTOPILOT_LEASE_BACKEND: filesystem
    # Uncomment and set when using bind mounts:
    # env_file:
    #   - autopilot.env
    volumes:
      - akc_outputs:/data/outputs
      # Replace with your real ingest state path (must exist before start).
      - ./ingest_state.example.json:/data/state/ingest_state.json:ro
    command:
      - runtime
      - autopilot
      - --outputs-root
      - /data/outputs
      - --ingest-state-path
      - /data/state/ingest_state.json
      - --living-automation-profile
      - living_loop_unattended_v1
      - --unattended-defaults
      - --env-profile
      - prod
      - --lease-backend
      - filesystem
      - --controller-id
      - compose-autopilot-1
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'akc.*runtime.*autopilot' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  akc_outputs:
