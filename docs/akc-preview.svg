<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="AKC overview: Plan Retrieve Generate Execute Repair with safety gates">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 34px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e5e7eb; }
      .sub { font: 500 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #9ca3af; }
      .pill { font: 600 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e5e7eb; }
      .label { font: 700 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e5e7eb; }
      .small { font: 600 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #cbd5e1; }
      .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill: #cbd5e1; }
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="420" rx="22" fill="url(#bg)"/>

  <!-- header -->
  <text x="54" y="74" class="title">Agentic Knowledge Compiler (AKC)</text>
  <text x="54" y="104" class="sub">Compile docs, chats, and APIs into runnable artifacts with retrieval + safety gates.</text>

  <!-- pills -->
  <g transform="translate(54, 130)">
    <rect x="0" y="0" width="184" height="34" rx="17" fill="#1f2937" stroke="#334155"/>
    <text x="16" y="22" class="pill">tenant + repo scoped</text>

    <rect x="198" y="0" width="166" height="34" rx="17" fill="#1f2937" stroke="#334155"/>
    <text x="214" y="22" class="pill">OPA/Rego gates</text>

    <rect x="376" y="0" width="172" height="34" rx="17" fill="#1f2937" stroke="#334155"/>
    <text x="392" y="22" class="pill">tests + repair loops</text>

    <rect x="560" y="0" width="194" height="34" rx="17" fill="#1f2937" stroke="#334155"/>
    <text x="576" y="22" class="pill">replayable manifests</text>
  </g>

  <!-- main card -->
  <g transform="translate(54, 184)" filter="url(#shadow)">
    <rect x="0" y="0" width="1092" height="200" rx="18" fill="url(#card)" stroke="#334155"/>

    <!-- loop title -->
    <text x="28" y="46" class="label">Plan ’ Retrieve ’ Generate ’ Execute ’ Repair</text>
    <text x="28" y="76" class="sub">Retrieval comes from a structured index + code memory before each generation step.</text>

    <!-- steps -->
    <g transform="translate(28, 104)">
      <!-- helper: a step card -->
      <g>
        <rect x="0" y="0" width="180" height="70" rx="14" fill="#0b1227" stroke="#334155"/>
        <text x="18" y="30" class="label" font-size="18">Plan</text>
        <text x="18" y="52" class="small">break intent into steps</text>
      </g>

      <g transform="translate(210, 0)">
        <rect x="0" y="0" width="180" height="70" rx="14" fill="#0b1227" stroke="#334155"/>
        <text x="18" y="30" class="label" font-size="18">Retrieve</text>
        <text x="18" y="52" class="small">index + code memory</text>
      </g>

      <g transform="translate(420, 0)">
        <rect x="0" y="0" width="180" height="70" rx="14" fill="#0b1227" stroke="#334155"/>
        <text x="18" y="30" class="label" font-size="18">Generate</text>
        <text x="18" y="52" class="small">produce patch/artifacts</text>
      </g>

      <g transform="translate(630, 0)">
        <rect x="0" y="0" width="180" height="70" rx="14" fill="#0b1227" stroke="#334155"/>
        <text x="18" y="30" class="label" font-size="18">Execute</text>
        <text x="18" y="52" class="small">sandbox + tests</text>
      </g>

      <g transform="translate(840, 0)">
        <rect x="0" y="0" width="224" height="70" rx="14" fill="#0b1227" stroke="#334155"/>
        <text x="18" y="30" class="label" font-size="18">Repair</text>
        <text x="18" y="52" class="small">iterate until gates pass</text>
      </g>

      <!-- arrows -->
      <g stroke="#64748b" stroke-width="2" fill="none" opacity="0.9">
        <path d="M 185 35 L 205 35"/>
        <path d="M 395 35 L 415 35"/>
        <path d="M 605 35 L 625 35"/>
        <path d="M 815 35 L 835 35"/>
      </g>
      <g fill="#93c5fd" opacity="0.9">
        <path d="M 205 35 l -10 -6 v 12 z"/>
        <path d="M 415 35 l -10 -6 v 12 z"/>
        <path d="M 625 35 l -10 -6 v 12 z"/>
        <path d="M 835 35 l -10 -6 v 12 z"/>
      </g>
    </g>
  </g>

  <!-- footer -->
  <text x="54" y="404" class="mono">Artifacts include IR, run manifests, policy decisions, test outputs, and viewer exports.</text>
</svg>
